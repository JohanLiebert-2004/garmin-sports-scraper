services:
  - type: web
    name: garmin-sports-scraper
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
